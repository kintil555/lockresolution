name: Build & Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: |
          dotnet publish src/LockResolution.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o dist

      - name: Copy scripts
        run: |
          copy installer\install.bat dist\install.bat
          copy scripts\setup.bat dist\setup.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LockResolution
          path: |
            dist/LockResolution.exe
            dist/install.bat
            dist/setup.bat

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/LockResolution.exe
            dist/install.bat
            dist/setup.bat
          body: |
            ## LockResolution ${{ github.ref_name }}

            ### Cara Install
            1. Download ketiga file di bawah
            2. Taruh di satu folder (misal `C:\Tools\LockResolution\`)
            3. Jalankan `install.bat` sebagai **Administrator** → pilih **[1] Install**
            4. Set resolusi: `LockResolution.exe set 1920 1080`

            ### CMD Usage
            ```
            LockResolution.exe set 1920 1080    ← set target resolusi
            LockResolution.exe status           ← lihat status
            LockResolution.exe list             ← lihat semua monitor
            LockResolution.exe apply            ← terapkan sekarang
            LockResolution.exe enable/disable   ← aktifkan/pause
            ```
